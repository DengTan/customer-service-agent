name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm ts-check

      - name: Lint
        run: pnpm lint --quiet

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "9"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run --reporter=default

  migration-static-check:
    name: Migration Static Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: No future-dated migrations
        run: |
          echo "Checking for future-dated migrations..."
          for f in supabase/migrations/*.sql; do
            date=$(echo "$f" | grep -oP '\d{8}' | head -1)
            if [ -n "$date" ] && [ "$date" -gt "20260714" ]; then
              # Whitelist known future-dated migrations
              case "$f" in
                *20260715_add_bot_platform_connection.sql*) echo "  whitelisted: $f" ;;
                *20260726_content_security_filter.sql*) echo "  whitelisted: $f" ;;
                *20260728_bot_update_rpc.sql*) echo "  whitelisted: $f" ;;
                *) echo "ERROR: Future-dated migration: $f"; exit 1 ;;
              esac
            fi
          done
          echo "No unexpected future-dated migrations found."

      - name: SECURITY DEFINER functions must have search_path
        run: |
          echo "Checking SECURITY DEFINER without SET search_path..."
          grep -r "CREATE" supabase/migrations/ | grep -i "SECURITY DEFINER" | while read line; do
            # Extract filename from grep output
            file=$(echo "$line" | cut -d: -f1)
            # Check if this file has SET search_path within reasonable lines
            # Exempt 20260726_content_security_filter.sql which uses inline PERFORM set_config()
            if ! grep -A 20 "SECURITY DEFINER" "$file" | grep -iq "search_path"; then
              case "$file" in
                *20260726_content_security_filter.sql*) ;;
                *) echo "ERROR: SECURITY DEFINER without search_path in $file"; exit 1 ;;
              esac
            fi
          done
          echo "All SECURITY DEFINER functions have search_path pinning."

      - name: No exec() function
        run: |
          echo "Checking for exec() function definition..."
          if grep -r "CREATE.*FUNCTION.*exec(" supabase/migrations/ > /dev/null 2>&1; then
            echo "ERROR: exec() function found in migrations"
            exit 1
          fi
          echo "No exec() function found."

      - name: New tables must have RLS in post-RLS era migrations
        run: |
          echo "Checking new tables in post-20260713 migrations for ENABLE ROW LEVEL SECURITY..."
          # Only check migrations dated >= 20260713, excluding known whitelisted files
          for f in supabase/migrations/*.sql; do
            date=$(echo "$f" | grep -oP '\d{8}' | head -1)
            # Only check RLS-era migrations
            if [ -z "$date" ] || [ "$date" -lt "20260713" ]; then continue; fi
            # Skip whitelisted files
            case "$f" in
              *20260713_retrieval_traces.sql*) echo "  whitelisted: $f (known gap)"; continue ;;
              *20260726_content_security_filter.sql*) echo "  whitelisted: $f (never applied)"; continue ;;
            esac
            # Extract CREATE TABLE statements and check if ENABLE ROW LEVEL SECURITY follows
            # This is a simplified check — the full check is in scripts/check-rls-state.ts
          done
          echo "RLS-era migration table check passed."

      - name: Run TypeScript migration validation script
        run: |
          echo "Running scripts/check-rls-state.ts static checks..."
          node --version
          # Install pnpm and tsx for the script
          npm install -g pnpm@9 tsx 2>/dev/null || true
          pnpm install --frozen-lockfile
          pnpm tsx scripts/check-rls-state.ts
